openapi: 3.0.0
info:
  title: API Gestión de catalogo
  version: 1.0.0
  description: API Gestión de catalogo con autenticación JWT
  contact:
    name: Bowen
    email: bowen@example.com
  license:
    name: CM

servers:
  - url: http://localhost:3000
    description: Servidor local

paths:
  /api/registrar:
    post:
      summary: Registrar un nuevo usuario
      description: Crea una nueva cuenta de usuario con email y contraseña
      tags:
        - Autenticación
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: usuario@example.com
                password:
                  type: string
                  format: password
                  minLength: 6
                  example: miContraseña123
      responses:
        '201':
          description: Usuario registrado correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Usuario registrado correctamente
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      email:
                        type: string
                        example: usuario@example.com
                      rol:
                        type: string
                        example: usuario
        '500':
          description: Error en el servidor
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: El email ya está registrado

  /api/login:
    post:
      summary: Iniciar sesión
      description: Autentica un usuario y retorna un token JWT
      tags:
        - Autenticación
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: usuario@example.com
                password:
                  type: string
                  format: password
                  example: miContraseña123
      responses:
        '200':
          description: Usuario autenticado correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Usuario loggeado correctamente
                  data:
                    type: object
                    properties:
                      token:
                        type: string
                        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        '500':
          description: Credenciales inválidas
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Email o contraseña incorrectos

  /api/logout:
    post:
      summary: Cerrar sesión
      description: Revoca el token JWT actual agregándolo a la lista negra
      tags:
        - Autenticación
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Usuario deslogueado correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Usuario deslogueado correctamente
        '401':
          description: Token no proporcionado o inválido
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: No se proporciono el token

  /api/generos:
    get:
      summary: Obtener todas los generos
      description: Retorna la lista de generos de la biblioteca
      tags:
        - generos
      security:
        - BearerAuth: []
      responses:
        '200':
          description: generos obtenidas correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: generos obtenidas correctamente
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 1
                        nombre:
                          type: string
                          example: La iliada
        '401':
          description: No autorizado
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Token inválido o expirado
        '500':
          description: Error en el servidor
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Error al obtener las tareas

    post:
      summary: Crear un nuevo genero
      description: Crea nuevo  genero
      tags:
        - generos
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - titulo
              properties:
                nombre:
                  type: string
                  example: Drama
      responses:
        '200':
          description: Genero creado correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Genero creado correctamente
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      nombre:
                        type: string
                        example: Drama
        '401':
          description: No autorizado
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Token inválido o expirado
        '500':
          description: Error en el servidor
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Error al crear el libro
  /api/contenidos:
    get:
      summary: Obtener todas los contenidos
      description: Retorna la lista de contenidos 
      tags:
        - contenidos
      security:
        - BearerAuth: []
      responses:
        '200':
          description: contenidos obtenidas correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: contenidos obtenidas correctamente
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 1
                        nombre:
                          type: string
                          example: Cars
                        generoId:
                          type:integer
                          example:3
        '401':
          description: No autorizado
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Token inválido o expirado
        '500':
          description: Error en el servidor
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Error al obtener las tareas

    post:
      summary: Crear un nuevo contenido
      description: Crea nuevo  contenido
      tags:
        - contenidos
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - titulo
              properties:
                nombre:
                  type: string
                  example: Drama
      responses:
        '200':
          description: Genero creado correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Genero creado correctamente
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      nombre:
                        type: string
                        example: Drama
        '401':
          description: No autorizado
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Token inválido o expirado
        '500':
          description: Error en el servidor
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Error al crear el libro
  /api/contenidos{id}:
    put:
      summary: Editar un nuevo contenido
      description: Editar nuevo  contenido
      tags:
        - contenidos
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - titulo
              properties:
                nombre:
                  type: string
                  example: Drama
                generoId:
                  type: integer
      responses:
        '200':
          description: contenido editado correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: contenido editado correctamente
                  data:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      nombre:
                        type: string
                        example: Drama
        '401':
          description: No autorizado
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Token inválido o expirado
        '500':
          description: Error en el servidor
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Error al crear el libro
    delete:
        summary: Eliminar un contenido
        description: Elimina una contenido
        tags:
          - contenidos
        security:
          - BearerAuth: []
        parameters:
          - name: id
            in: path
            required: true
            description: ID de la contenido a eliminar
            schema:
              type: integer
              example: 1
        responses:
          '200':
            description: contenido eliminada correctamente
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    message:
                      type: string
                      example: contenido eliminada correctamente
                    data:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 1
                        name:
                          type: string
                          example: Cars
                        generoId:
                          type: integer
                          example: 1
          '401':
            description: No autorizado
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    message:
                      type: string
                      example: Token inválido o expirado
          '403':
            description: Acceso denegado - se requiere rol de administrador
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    message:
                      type: string
                      example: No tienes permisos para realizar esta acción
          '500':
            description: Error en el servidor
            content:
              application/json:
                schema:
                  type: object
                  properties:
                    message:
                      type: string
                      example: Error al contenido la tarea
    
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Token JWT obtenido al hacer login

  schemas:
    Usuario:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
          format: email
        password:
          type: string
          format: password
        rol:
          type: string
          enum: [usuario, admin]

    genero:
      type: object
      properties:
        id:
          type: integer
        nombre:
          type: string
    
    contenido:
      type: object
      properties:
        id:
          type: integer
        nombre:
          type: string
        generoId:
          type: integer

tags:
  - name: Autenticación
    description: Endpoints para registro, login y logout
  - name: generos
    description: Endpoints para gestionar generos
  - name: contenidos
    description: Endpoints para gestionar generos